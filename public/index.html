<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Graph Input</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="container">
    <div class="input-card">
      <label class="input-label">Enter Function</label>

      <form action="/solve" method="POST">
        <div class="input-row">
          <span class="math-prefix">f(x) =</span>
          <input 
            type="text" 
            placeholder="e.g. x^2 + 3x - 1" 
            class="function-input"
            name="function"
          />
        </div>

        <button type="submit" class="submit-btn">Graph</button>
      </form>
    </div>
  </div>

  <div id="result"></div>

  <script src="script.js"></script>
</body>
</html>
